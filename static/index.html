<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>

    <!-- petType gender eyeColor tailLength name -->

    <form action="/pets/orders" method="POST">
        <label>
            <select name="petType">
                <option value="dog">Собака</option>
                <option value="cat">Кошка</option>
                <option value="tiger">Тигр</option>
            </select><br>
        </label>

        <label>
            <input type="radio" name="gender" value="boy"> Мужчина
        </label>

        <label>
            <input type="radio" name="gender" value="girl"> Женщина
        </label>

        <label>
            <input type="radio" name="gender" value="none"> Не определился
        </label><br>

        <label>
            Выбирете цвет глаз:
            <input type="color" name="eyeColor">
            <br>
        </label>

        <label>
            Укажите длину хвоста:
            <input type="number" name="tailLength" min="7" max="120">
            см<br>
        </label>

        <label>
            Введите имя:
            <input type="text" name="name"><br>
        </label>

        <label>
            Email:
            <input type="email" name="email" placeholder="example@mail.com" required>
        </label>
        <br><br>

        <label>
            Дата рождения:
            <input type="date" name ="dateOfBirth" value="2023-01-01" required>
        </label>
        <br><br>

        <label>
            Номер телефона:
            <input type="tel" name ="phone" placeholder="+7 (999) 123-45-67" required>
        </label>
        <br><br>

        <label>
            <input type="checkbox" value="true" name ="rules" required>
            Я согласен с правилами платформы
        </label>
        <br><br>

        <input type="reset" value="Сбросить все значения">
        <button type="submit">Отправить заявку</button>
    </form>

</main>
</body>
</html>
